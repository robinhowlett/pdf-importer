name: Release to GitHub Packages

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          overwrite-settings: false

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-publish</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS

      - name: Build fat JAR
        run: mvn package -Djooq.codegen.skip=true -DskipTests -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Deploy to GitHub Packages
        continue-on-error: true
        run: mvn deploy -Djooq.codegen.skip=true -DskipTests -B -DaltDeploymentRepository=github-publish::https://maven.pkg.github.com/robinhowlett/pdf-importer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Create GitHub Release with fat JAR
        uses: softprops/action-gh-release@v2
        with:
          files: target/pdf-importer-*.jar
          generate_release_notes: true
