services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: handycapper
      POSTGRES_PASSWORD: handycapper
      POSTGRES_DB: handycapper
    ports:
      - "5433:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - handycapper_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handycapper -d handycapper"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  handycapper_data:
